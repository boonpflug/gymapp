databaseChangeLog:
  - changeSet:
      id: t-001-users
      author: gymplatform
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: password_hash
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: first_name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: tenant_id
                  type: varchar(100)
              - column:
                  name: enabled
                  type: boolean
                  defaultValueBoolean: true
              - column:
                  name: email_verified
                  type: boolean
                  defaultValueBoolean: false
              - column:
                  name: last_login_at
                  type: timestamp with time zone
              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: now()
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  defaultValueComputed: now()
        - createTable:
            tableName: refresh_tokens
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
              - column:
                  name: token
                  type: varchar(255)
                  constraints:
                    unique: true
              - column:
                  name: user_id
                  type: uuid
              - column:
                  name: expires_at
                  type: timestamp with time zone
              - column:
                  name: revoked
                  type: boolean
                  defaultValueBoolean: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: now()
        - createTable:
            tableName: audit_logs
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
              - column:
                  name: entity_type
                  type: varchar(100)
              - column:
                  name: entity_id
                  type: uuid
              - column:
                  name: action
                  type: varchar(50)
              - column:
                  name: user_id
                  type: uuid
              - column:
                  name: old_value
                  type: text
              - column:
                  name: new_value
                  type: text
              - column:
                  name: tenant_id
                  type: varchar(100)
              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: now()

