server:
  port: ${PORT:8080}

spring:
  application:
    name: gym-platform
  datasource:
    url: jdbc:postgresql://localhost:5432/gymplatform
    username: gymplatform
    password: gymplatform123
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: public
  rabbitmq:
    host: localhost
    port: 5672
    username: gymplatform
    password: gymplatform123
  data:
    redis:
      host: localhost
      port: 6379
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

jwt:
  secret: c2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1neW0tcGxhdGZvcm0tMjAyNA==
  access-token-expiry: 900000
  refresh-token-expiry: 604800000

stripe:
  api-key: ${STRIPE_API_KEY:sk_test_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}

gocardless:
  access-token: ${GOCARDLESS_ACCESS_TOKEN:sandbox_placeholder}
  environment: sandbox
  webhook-secret: ${GOCARDLESS_WEBHOOK_SECRET:placeholder}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.gymplatform: DEBUG
    org.hibernate.SQL: DEBUG
