version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gymapp-postgres
    environment:
      POSTGRES_DB: gymplatform
      POSTGRES_USER: gymplatform
      POSTGRES_PASSWORD: gymplatform123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymplatform"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gymapp-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: gymapp-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: gymplatform
      RABBITMQ_DEFAULT_PASS: gymplatform123
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: gymapp-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gymplatform
      SPRING_DATASOURCE_USERNAME: gymplatform
      SPRING_DATASOURCE_PASSWORD: gymplatform123
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: gymplatform
      SPRING_RABBITMQ_PASSWORD: gymplatform123
      SPRING_DATA_REDIS_HOST: redis
      JWT_SECRET: c2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1neW0tcGxhdGZvcm0tMjAyNA==
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: gymapp-frontend
    environment:
      VITE_API_URL: http://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
